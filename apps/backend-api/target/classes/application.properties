# ──────────────────────────────────────────────────────────────────────
# Telemetry Map View — Backend API Configuration
# ──────────────────────────────────────────────────────────────────────

spring.application.name=backend-api
server.port=8080

# ── Security / OAuth2 Resource Server ─────────────────────────────────
# Token issuer — must match the `iss` claim in access tokens from Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/telemetry
# JWKS endpoint (derived from issuer-uri automatically; override if needed)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/telemetry/protocol/openid-connect/certs

# ── CORS ───────────────────────────────────────────────────────────────
# Angular dev server origin
telemetry.cors.allowed-origins=http://localhost:4200

# ── Logging ────────────────────────────────────────────────────────────
logging.level.com.telemetry=DEBUG
logging.level.org.springframework.security=INFO
logging.level.reactor=WARN

# ── Actuator ───────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
